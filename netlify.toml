# Netlify configuration for DPR Analyzer Pro.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# /api/* paths are claimed by the v2 functions via their `export const
# config = { path: '/api/...' }` blocks. This redirect is belt-and-braces
# in case any future function uses the legacy v1 invocation path.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — every non-asset, non-API route should serve index.html
# so React Router can take over on the client.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
